<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomiGo Budget | إدارة الميزانية بذكاء</title>
  <meta name="description" content="HomiGo Budget تطبيق ذكي لإدارة الميزانية الشهرية والمصاريف والمدفوعات بطريقة سهلة وعصرية." />
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #16181d;
      --muted: #6b7280;
      --primary: #1f6feb;
      --primary-dark: #1558bb;
      --accent: #18b67f;
      --border: #e6eaf2;
      --shadow: 0 12px 36px rgba(17, 24, 39, 0.08);
      --radius: 22px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #f8faff 0%, #f6f7fb 100%);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }

    .container {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(255,255,255,0.78);
      border-bottom: 1px solid rgba(230,234,242,0.9);
    }

    .nav {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      min-height:74px;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      font-size:22px;
    }

    .brand-badge {
      width:46px;
      height:46px;
      border-radius:14px;
      background: linear-gradient(135deg,var(--primary),#61a4ff);
      color:white;
      display:grid;
      place-items:center;
      font-size:20px;
    }

    .nav-links {
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
    }

    .nav-links a {
      color:var(--muted);
      font-weight:600;
    }

    .nav-links a:hover {
      color:var(--text);
    }

    .footer {
      padding:24px 0 50px;
    }

    .footer-card {
      padding:18px 22px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      border:1px solid #e6eaf2;
      border-radius:22px;
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="container nav">
    <a href="#home" class="brand">
      <span class="brand-badge">💰</span>
      <span>HomiGo Budget</span>
    </a>

    <!-- ✅ تم الربط هنا -->
    <nav class="nav-links">

      <a href="#screens">اللقطات</a>
      <a href="#download">التحميل</a>

      <a href="description.html">وصف التطبيق</a>
      <a href="about.html">عن التطبيق</a>
      <a href="faq.html">الأسئلة</a>
      <a href="support.html">الدعم</a>
      <a href="contact.html">التواصل</a>
      <a href="privacy.html">الخصوصية</a>
    </nav>
  </div>
</header>

<main>
  <!-- باقي الكود كما هو عندك بدون تغيير -->
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-card">
      <p>© 2026 HomiGo Budget. جميع الحقوق محفوظة.</p>

      <!-- ✅ تم الربط هنا -->
      <div class="nav-links">
        <a href="about.html">عن التطبيق</a>
        <a href="faq.html">الأسئلة</a>
        <a href="support.html">الدعم</a>
        <a href="contact.html">التواصل</a>
        <a href="privacy.html">الخصوصية</a>
        <a href="/app-ads.txt" target="_blank">app-ads.txt</a>
      </div>
    </div>
  </div>
</footer>

</body>
</html>

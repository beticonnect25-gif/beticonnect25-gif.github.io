<p>This policy explains how HomiGo Budget handles data and permissions when users interact with the app.</p>

<h2>Privacy Policy – HomiGo Budget</h2>
<p>HomiGo Budget is committed to protecting user privacy and being transparent about how data and device permissions are used.</p>

<h2>1. Information Collection</h2>

function applyLang(lang){
  const x = d[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.dataset.i18n;
    if(x[k]) el.innerHTML = x[k];
  });

  localStorage.setItem('site_lang',lang);
}

const s = document.getElementById('lang');
const v = localStorage.getItem('site_lang') || 'ar';
s.value = v;
applyLang(v);

s.onchange = e => applyLang(e.target.value);
</script>

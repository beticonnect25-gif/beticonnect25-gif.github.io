content: `
<p>توضح هذه السياسة كيفية تعامل تطبيق HomiGo Budget مع البيانات والصلاحيات عند استخدام التطبيق.</p>

<ul>
<li>معرّف المستخدم (UID) عبر Firebase Authentication عند تسجيل الدخول باستخدام Google</li>
<li>بيانات الاشتراك مثل حالة الاشتراك وتاريخ الانتهاء</li>
</ul>

<ul>
<li>معرّف الإعلانات (Advertising ID)</li>

<h2>2. إذن الكاميرا</h2>
<p>قد يطلب التطبيق إذن الوصول إلى الكاميرا فقط عند استخدام ميزة مسح رمز QR أو الباركود بشكل مباشر من قبل المستخدم.</p>
<ul>
<li>يتم طلب إذن الكاميرا فقط عند الحاجة الفعلية لميزة المسح</li>
<li>يُستخدم إذن الكاميرا فقط لقراءة رمز QR أو الباركود</li>
<li>لا يتم استخدام الكاميرا دون تفاعل مباشر من المستخدم</li>

<li>تحسين تجربة المستخدم</li>
<li>الامتثال لسياسات Google Play</li>
</ul>

<h2>4. مشاركة المعلومات</h2>
<p>قد تتم مشاركة بعض البيانات مع:</p>
<ul>
<li>Google LLC من خلال AdMob وخدمات Google</li>
</ul>
<p>ولا يتم بيع البيانات أو مشاركتها مع أي أطراف أخرى خارج ما هو مذكور في هذه السياسة.</p>

<h2>5. بيانات الميزانية</h2>
<p>جميع بيانات الميزانية والمصروفات التي يُدخلها المستخدم:</p>
<ul>
<li>تُخزّن محليًا على جهاز المستخدم فقط</li>
<li>لا يتم رفعها إلى أي خادم خارجي</li>
<li>لا يمكن للمطور أو أي جهة خارجية الوصول إليها</li>
</ul>

<h2>6. الاشتراكات</h2>
<p>عند شراء اشتراك داخل التطبيق:</p>
<ul>
<li>يتم ربط الاشتراك بحساب المستخدم (UID)</li>
<li>يتم التحقق من الاشتراك عبر Google Play</li>
<li>يتم تخزين حالة الاشتراك فقط على الخادم لأغراض التحقق</li>
</ul>

<h2>7. حذف الحساب والبيانات</h2>
<p>يمكن للمستخدم طلب حذف حسابه والبيانات المرتبطة به في أي وقت عبر التواصل على البريد الإلكتروني التالي:</p>
<p>traikeyy@gmail.com</p>

<p>يرجى إرسال طلب بعنوان: طلب حذف حساب HomiGo Budget</p>

<p>عند طلب الحذف، سيتم تنفيذ الآتي:</p>
<ul>
<li>حذف بيانات الاشتراك المرتبطة بالمستخدم على الخادم</li>
<li>حذف أي بيانات مرتبطة بالحساب محفوظة على الخادم</li>
<li>عدم إمكانية استرجاع البيانات بعد تنفيذ الحذف</li>
</ul>

<p>ملاحظة: بيانات الميزانية والمصروفات المخزنة محليًا على الجهاز يمكن حذفها من خلال حذف التطبيق أو مسح بيانات التطبيق من إعدادات الهاتف.</p>

<h2>8. الفئة العمرية</h2>
<p>التطبيق مخصص للمستخدمين الذين تبلغ أعمارهم 18 عامًا أو أكثر، ولا يستهدف الأطفال.</p>

<h2>9. التغييرات على سياسة الخصوصية</h2>
<p>قد يتم تحديث هذه السياسة من وقت لآخر، وسيتم نشر أي تحديث داخل التطبيق أو على صفحة المتجر أو في هذه الصفحة.</p>

<h2>10. التواصل</h2>
<p>لأي استفسارات تتعلق بالخصوصية أو حذف البيانات:</p>
<p>traikeyy@gmail.com</p>
`
},

en: {
back:'⬅ Back to Home',
lang:'Language',
h1:'Privacy Policy',
date:'Last updated: 19-04-2026',

content: `

};

function applyLang(lang){
  const x = d[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.dataset.i18n;
    if(x[k]) el.innerHTML = x[k];
  });

  localStorage.setItem('site_lang',lang);
}

const s = document.getElementById('lang');
const v = localStorage.getItem('site_lang') || 'ar';
s.value = v;
applyLang(v);

s.onchange = e => applyLang(e.target.value);
</script>

</body>

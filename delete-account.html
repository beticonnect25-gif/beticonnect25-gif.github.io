<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حذف الحساب | HomiGo Budget</title>

<style>
body{
  font-family:Segoe UI,Tahoma,Arial,sans-serif;
  background:#fffaf9;
  margin:0;
  padding:24px;
  color:#1f2430;
  line-height:1.95;
}
.wrap{
  max-width:980px;
  margin:auto;
  background:#fff;
  border:1px solid #f0d8d3;
  border-radius:18px;
  padding:28px;
}
.top{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:20px;
}
a{
  color:#e85e52;
  text-decoration:none;
  font-weight:700;
}
h1,h2{
  color:#e85e52;
}
select{
  border:1px solid #f0d8d3;
  border-radius:10px;
  padding:8px;
}
ul{
  padding-inline-start:22px;
}
.card{
  background:#fff7f5;
  border:1px solid #f3d4ce;
  border-radius:16px;
  padding:18px;
  margin:18px 0;
}
.email-box{
  display:inline-block;
  margin-top:10px;
  padding:10px 14px;
  background:#fff;
  border:1px solid #f0d8d3;
  border-radius:12px;
  font-weight:700;
  color:#e85e52;
  direction:ltr;
}
.note{
  background:#fff3ef;
  border-right:4px solid #e85e52;
  padding:14px 16px;
  border-radius:12px;
  margin-top:18px;
}
.steps{
  counter-reset: step;
  list-style:none;
  padding:0;
  margin:0;
}
.steps li{
  position:relative;
  padding:12px 14px 12px 52px;
  margin:12px 0;
  background:#fff;
  border:1px solid #f0d8d3;
  border-radius:14px;
}
.steps li::before{
  counter-increment: step;
  content: counter(step);
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  width:28px;
  height:28px;
  border-radius:50%;
  background:#e85e52;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:14px;
}
html[dir="ltr"] .steps li{
  padding:12px 52px 12px 14px;
}
html[dir="ltr"] .steps li::before{
  right:auto;
  left:14px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="top">
  <a href="index.html" data-i18n="back">⬅ الرجوع للرئيسية</a>

  <div>
    <label data-i18n="lang">اللغة</label>
    <select id="lang">
      <option value="ar">العربية</option>
      <option value="en">English</option>
    </select>
  </div>
</div>

<h1 data-i18n="h1">حذف الحساب</h1>
<p data-i18n="date">آخر تحديث: 21-04-2026</p>

<div data-i18n="content"></div>

</div>

};

function applyLang(lang){
  const x = d[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.dataset.i18n;
    if(x[k]) el.innerHTML = x[k];
  });

  localStorage.setItem('site_lang',lang);
}

const s = document.getElementById('lang');
const v = localStorage.getItem('site_lang') || 'ar';
s.value = v;
applyLang(v);

s.onchange = e => applyLang(e.target.value);
</script>

</body>
</html>
